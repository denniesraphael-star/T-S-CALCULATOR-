    <script>

        const dict = {

                cost: 'Cost', gas: 'Gas', bal: 'Remaining Bal', qty: 'CES Coins', totInc: 'Est. Income', 
                langText: 'മലയാളം', configTitle: 'Market Rates', totalTitle: 'Total'
            },
            'ml': { 
                lUsdt: '1 USDT (₹)', lPol: '1 POL (₹)', lCes: '1 CES ($)', lGas: 'ഗ്യാസ് ഫീ (POL)', lBudget: 'ആകെ നിക്ഷേപം (₹)', 
                cost: 'ചെലവ്', gas: 'ഗ്യാസ്', bal: 'ബാക്കി തുക', qty: 'CES ടോക്കൺ', totInc: 'വരുമാനം', 
                langText: 'English', configTitle: 'മാർക്കറ്റ് നിരക്കുകൾ', totalTitle: 'ആകെ'
            }
        };

        function toggleLang() {
            isMl = !isMl;
            const lang = isMl ? 'ml' : 'en';
            
            document.getElementById('langText').innerText = dict[lang].langText;
            document.getElementById('lUsdt').innerText = dict[lang].lUsdt;
            document.getElementById('lPol').innerText = dict[lang].lPol;
            document.getElementById('lCes').innerText = dict[lang].lCes;
            document.getElementById('lGas').innerText = dict[lang].lGas;
            document.getElementById('lBudget').innerHTML = `<i class="ph-fill ph-wallet"></i> ${dict[lang].lBudget}`;
            document.getElementById('configTitle').innerHTML = `<i class="ph ph-sliders-horizontal"></i> ${dict[lang].configTitle}`;
            
            render();
        }

        const slotData = [
            { id: 1, type: 'S6', cost: 10 }, { id: 2, type: 'S6', cost: 18 }, { id: 3, type: 'S3', cost: 32.4 },
            { id: 4, type: 'S6', cost: 58.3 }, { id: 5, type: 'S6', cost: 105 }, { id: 6, type: 'S3', cost: 189 },
            { id: 7, type: 'S6', cost: 340 }, { id: 8, type: 'S6', cost: 612 }, { id: 9, type: 'S3', cost: 1102 },
            { id: 10, type: 'S6', cost: 1984 }, { id: 11, type: 'S6', cost: 3571 }, { id: 12, type: 'S3', cost: 6428 }
        ];

        function render() {
            const usdt = parseFloat(document.getElementById('rateUsdt').value) || 0;
            const pol = parseFloat(document.getElementById('ratePol').value) || 0;
            const ces = parseFloat(document.getElementById('rateCes').value) || 0;
            const gasNum = parseFloat(document.getElementById('gasPol').value) || 0;
            const budget = parseFloat(document.getElementById('userBudget').value) || 0;
            const lang = isMl ? 'ml' : 'en';
            
            const container = document.getElementById('dashboard');
            container.innerHTML = '';
            let runningSpent = 0;

            slotData.forEach(s => {
                const igtInr = s.cost * usdt;
                const gasInr = gasNum * pol;
                const totalSlot = igtInr + gasInr;
                
                // Track if user has enough balance to unlock THIS slot
                const prevBal = budget - runningSpent;
                const isAffordable = prevBal >= totalSlot;

                runningSpent += totalSlot;
                const bal = budget - runningSpent;
                const cesQty = bal > 0 ? (bal / (ces * usdt)).toFixed(2) : 0;

                let incomeArr = new Array(6).fill(0);
                const pVal = igtInr * 0.9;

                if(s.type === 'S6') { 
                    incomeArr[2] = incomeArr[3] = incomeArr[4] = pVal; 
                } else { 
                    incomeArr[0] = incomeArr[1] = incomeArr[3] = incomeArr[4] = pVal;

                const totalIncome = incomeArr.reduce((a, b) => a + b, 0);

                    ? 'bg-slate-900 border-slate-700 shadow-lg'

                const badgeStyle = s.type === 'S6' 
                    ? 'bg-blue-500/20 text-blue-400 border border-blue-500/30' 
                    : 'bg-purple-500/20 text-purple-400 border border-purple-500/30';

                container.innerHTML += `
                    <div class="${cardStyle} border p-5 rounded-[1.5rem] transition-all duration-300 relative">
                        ${!isAffordable ? '<div class="absolute inset-0 z-10 pointer-events-none"></div>' : ''}
                        
                        <!-- Header -->
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold text-white flex items-center gap-2">
                                <span class="bg-slate-800 p-1.5 rounded-lg text-emerald-400 text-sm"><i class="ph-fill ph-cube"></i></span>
                                Slot ${s.id}
                            </h2>
                            <span class="${badgeStyle} px-3 py-1 rounded-full text-xs font-bold tracking-widest shadow-sm">
                                ${s.type}
                            </span>
                        </div>

                        <!-- Cost Breakdown -->
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div class="space-y-1">
                                <p class="text-[11px] text-slate-400 uppercase tracking-wide">${dict[lang].cost}</p>
                                <p class="text-sm font-bold text-white">${s.cost} IGT <span class="text-slate-400 font-normal text-xs">(₹${igtInr.toFixed(0)})</span></p>
                            </div>
                            <div class="space-y-1">
                                <p class="text-[11px] text-slate-400 uppercase tracking-wide">${dict[lang].gas}</p>
                                <p class="text-sm font-bold text-red-400">${gasNum} POL <span class="text-slate-400 font-normal text-xs">(₹${gasInr.toFixed(0)})</span></p>
                            </div>
                        </div>

                        <!-- Highlighted Balances -->
                        <div class="flex justify-between items-center bg-slate-950 p-3 rounded-2xl border border-slate-800 mb-4">
                            <div>
                                <p class="text-[10px] text-slate-400 uppercase">${dict[lang].bal}</p>
                                <p class="font-bold ${bal > 0 ? 'text-sky-400' : 'text-slate-500'}">₹${bal > 0 ? bal.toFixed(0) : 0}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] text-slate-400 uppercase">${dict[lang].qty}</p>
                                <p class="font-bold ${bal > 0 ? 'text-yellow-400' : 'text-slate-500'}">${cesQty}</p>
                            </div>
                            <div class="text-right pl-3 border-l border-slate-800">
                                <p class="text-[10px] text-slate-400 uppercase">${dict[lang].totalTitle}</p>
                                <p class="font-bold text-white">₹${totalSlot.toFixed(0)}</p>
                            </div>
                        </div>

                        <!-- Income Matrix visualization -->
                        <div class="bg-black/40 p-3 rounded-2xl border border-slate-800/50">
                            <div class="grid grid-cols-6 gap-1.5 text-center">
                                ${incomeArr.map((val, i) => `
                                    <div class="flex flex-col items-center justify-center p-1 rounded-xl ${val > 0 ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 shadow-[0_0_10px_rgba(16,185,129,0.1)]' : 'bg-slate-900 text-slate-600'} text-[10px] font-medium h-[52px]">
                                        <span class="${val > 0 ? 'opacity-80' : ''}">P${i+1}</span>
                                        <span class="font-bold mt-0.5 leading-tight ${val > 0 ? '' : 'hidden'}">₹${val.toFixed(0)}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="mt-3 pt-3 border-t border-slate-800 flex justify-between items-center">
                                <span class="text-xs text-slate-400"><i class="ph ph-chart-line-up"></i> ${dict[lang].totInc}</span>
                                <span class="font-black text-emerald-400 text-lg">₹${totalIncome.toFixed(0)}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // Add event listeners to all inputs for real-time calculation
        document.querySelectorAll('input').forEach(i => i.addEventListener('input', render));
        
        // Initial render
        render();
    </script>
</body>
